<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Selamat Eid ul-Fitr — by.fuya</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@400;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  /* ─── RESET & VARS ─── */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --black:   #07070f;
    --fuchsia: #ff6ec7;
    --fuchsia2:#c94fa8;
    --cyan:    #7de8ff;
    --cyan2:   #34c3e0;
    --yellow:  #f9f871;
    --yellow2: #d4c500;
    --white:   #f0e8ff;
    --grid-col: rgba(255,110,199,0.07);
  }

  html, body {
    width:100%; min-height:100vh;
    background: var(--black);
    font-family: 'Nunito', sans-serif;
    color: var(--white);
    overflow-x: hidden;
  }

  /* ─── GRID BG ─── */
  body::before {
    content:'';
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(var(--grid-col) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-col) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPulse 6s ease-in-out infinite;
  }
  @keyframes gridPulse {
    0%,100%{ opacity:1; }
    50%{ opacity:0.4; }
  }

  /* corner glow */
  body::after {
    content:'';
    position:fixed; top:-200px; left:-200px;
    width:600px; height:600px;
    background: radial-gradient(circle, rgba(255,110,199,0.15), transparent 70%);
    pointer-events:none; z-index:0;
    animation: cornerFloat 8s ease-in-out infinite alternate;
  }
  @keyframes cornerFloat{
    to{ transform: translate(80px,60px); }
  }

  /* ─── FLOATING BG ELEMENTS ─── */
  .bg-decor { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }

  .ketupat {
    position:absolute;
    width:32px; height:32px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px;
    filter: drop-shadow(0 0 8px var(--cyan));
    animation: floatKetupat var(--dur,12s) linear infinite, glitchFloat 3s ease-in-out infinite;
  }
  @keyframes floatKetupat {
    from{ transform: translateY(110vh) rotate(0deg); }
    to  { transform: translateY(-10vh) rotate(360deg); }
  }
  @keyframes glitchFloat {
    0%,90%,100%{ filter: drop-shadow(0 0 8px var(--cyan)); }
    92%{ filter: drop-shadow(3px 0 0 var(--fuchsia)) drop-shadow(-3px 0 0 var(--cyan)); transform:translateX(4px); }
    94%{ filter: drop-shadow(-3px 0 0 var(--fuchsia)); transform:translateX(-4px); }
    96%{ filter: drop-shadow(0 0 8px var(--yellow)); transform:translateX(0); }
  }

  .mosque {
    position:absolute; bottom:0; right:60px;
    font-size:80px;
    filter: drop-shadow(0 0 18px var(--fuchsia)) drop-shadow(0 0 40px rgba(255,110,199,0.3));
    animation: mosqueGlow 2s ease-in-out infinite alternate, mosqueNeon 4s linear infinite;
    z-index:1;
  }
  @keyframes mosqueGlow {
    from{ filter: drop-shadow(0 0 14px var(--fuchsia)) drop-shadow(0 0 30px rgba(125,232,255,0.3)); }
    to  { filter: drop-shadow(0 0 28px var(--cyan)) drop-shadow(0 0 60px rgba(255,110,199,0.5)); }
  }
  @keyframes mosqueNeon {
    0%,100%{ text-shadow: 0 0 10px var(--fuchsia); }
    33%{ text-shadow: 0 0 10px var(--cyan); }
    66%{ text-shadow: 0 0 10px var(--yellow); }
  }

  .star-particle {
    position:absolute;
    width:4px; height:4px;
    background: var(--c, #fff);
    border-radius:50%;
    animation: starTwinkle var(--d,2s) ease-in-out infinite var(--del,0s) alternate;
    filter: blur(0.5px);
  }
  @keyframes starTwinkle {
    from{ opacity:0.1; transform:scale(0.5); }
    to  { opacity:1; transform:scale(1.5); }
  }

  /* ─── SCREENS ─── */
  .screen { position:relative; z-index:2; width:100%; min-height:100vh; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
  .screen.active { display:flex; }

  /* ─── INPUT SCREEN ─── */
  #inputScreen { gap:24px; }

  .logo-top {
    font-family:'Orbitron',sans-serif;
    font-size:clamp(11px,2.5vw,15px);
    letter-spacing:8px;
    color: var(--cyan);
    text-transform:uppercase;
    opacity:0.8;
    text-shadow: 0 0 12px var(--cyan);
    animation: fadePulse 3s ease-in-out infinite;
  }
  @keyframes fadePulse{ 0%,100%{opacity:.6;} 50%{opacity:1;} }

  .main-title {
    font-family:'Orbitron',sans-serif;
    font-size: clamp(28px, 8vw, 64px);
    font-weight:900;
    text-align:center;
    line-height:1.1;
    position:relative;
  }
  .main-title span { display:block; }
  .t1 { color: var(--yellow); text-shadow: 0 0 30px var(--yellow2), 0 0 60px rgba(249,248,113,0.3); }
  .t2 {
    color: var(--fuchsia);
    text-shadow: 0 0 20px var(--fuchsia), 0 0 50px rgba(255,110,199,0.4);
    animation: glitchTitle 5s infinite;
    position:relative;
  }
  .t2::before, .t2::after {
    content: attr(data-text);
    position:absolute; left:0; top:0; width:100%;
    clip-path: polygon(0 0, 100% 0, 100% 30%, 0 30%);
  }
  .t2::before { color:var(--cyan); animation: glitchA 5s infinite; }
  .t2::after  { color:var(--yellow); animation: glitchB 5s infinite; clip-path: polygon(0 60%,100% 60%,100% 100%,0 100%); }
  @keyframes glitchTitle{
    0%,88%,100%{ transform:none; }
    90%{ transform:skewX(-2deg) translateX(3px); }
    92%{ transform:skewX(2deg) translateX(-3px); }
    94%{ transform:none; }
  }
  @keyframes glitchA{
    0%,88%,100%{ opacity:0; transform:none; }
    90%{ opacity:0.9; transform:translate(-4px,2px); }
    92%{ opacity:0.7; transform:translate(2px,-1px); }
    94%{ opacity:0; }
  }
  @keyframes glitchB{
    0%,88%,100%{ opacity:0; }
    91%{ opacity:0.8; transform:translate(4px,1px); }
    93%{ opacity:0.6; transform:translate(-2px,0); }
    95%{ opacity:0; }
  }

  .subtitle-badge {
    background: linear-gradient(135deg, rgba(125,232,255,0.15), rgba(255,110,199,0.15));
    border: 1px solid rgba(125,232,255,0.4);
    border-radius:40px;
    padding:8px 24px;
    font-family:'Rajdhani',sans-serif;
    font-size:clamp(13px,2.5vw,17px);
    letter-spacing:3px;
    color:var(--cyan);
    text-shadow: 0 0 10px var(--cyan);
  }

  /* hologram input box */
  .input-wrapper {
    position:relative;
    width:min(420px,90vw);
  }
  .holo-label {
    font-size:clamp(11px,2vw,13px);
    letter-spacing:2px;
    color:var(--fuchsia);
    text-shadow:0 0 8px var(--fuchsia);
    margin-bottom:10px;
    display:block;
    font-family:'Rajdhani',sans-serif;
    font-weight:600;
  }
  .holo-input-outer {
    position:relative;
    border-radius:8px;
    padding:2px;
    background: linear-gradient(135deg, var(--fuchsia), var(--cyan), var(--yellow));
    animation: borderSpin 3s linear infinite;
    background-size:400% 400%;
  }
  @keyframes borderSpin{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }
  .holo-input {
    width:100%;
    background: rgba(7,7,15,0.95);
    border:none; outline:none;
    border-radius:7px;
    padding:16px 20px;
    font-family:'Nunito',sans-serif;
    font-size:clamp(14px,2.5vw,16px);
    color: var(--fuchsia);
    caret-color: var(--cyan);
    letter-spacing:1px;
  }
  .holo-input::placeholder { color: rgba(255,110,199,0.4); font-style:italic; }
  .holo-input:focus { box-shadow: 0 0 0 1px var(--fuchsia) inset, 0 0 30px rgba(255,110,199,0.15); }
  .scan-line {
    position:absolute; bottom:0; left:0; height:2px;
    background: linear-gradient(90deg,transparent,var(--cyan),transparent);
    animation: scanInput 2s linear infinite;
    border-radius:0 0 7px 7px;
    width:100%;
  }
  @keyframes scanInput{ 0%{opacity:0;transform:scaleX(0.2) translateX(-200%);} 50%{opacity:1;transform:scaleX(1);} 100%{opacity:0;transform:scaleX(0.2) translateX(200%);} }

  /* retro game button */
  .btn-masuk {
    font-family:'Orbitron',sans-serif;
    font-size:clamp(14px,2.5vw,18px);
    font-weight:900;
    letter-spacing:5px;
    text-transform:uppercase;
    color: var(--black);
    background: linear-gradient(135deg, var(--fuchsia) 0%, var(--yellow) 100%);
    border:none; cursor:pointer;
    padding: 16px 48px;
    border-radius:4px;
    position:relative;
    overflow:hidden;
    box-shadow: 4px 4px 0 var(--fuchsia2), 8px 8px 0 rgba(255,110,199,0.3), 0 0 40px rgba(255,110,199,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    animation: btnPulse 2s ease-in-out infinite;
  }
  @keyframes btnPulse{ 0%,100%{box-shadow: 4px 4px 0 var(--fuchsia2), 0 0 30px rgba(255,110,199,.4);} 50%{box-shadow: 4px 4px 0 var(--cyan2), 0 0 50px rgba(125,232,255,.5);} }
  .btn-masuk::before {
    content:'';
    position:absolute; top:0; left:-100%; width:60%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
    animation:btnShine 2.5s linear infinite;
  }
  @keyframes btnShine{ to{left:200%;} }
  .btn-masuk:hover { transform:translate(-2px,-2px); }
  .btn-masuk:active { transform:translate(4px,4px); box-shadow:none; }

  .pixel-corner {
    position:absolute; width:8px; height:8px;
    background:var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
  }
  .pc-tl{top:4px;left:4px;} .pc-tr{top:4px;right:4px;} .pc-bl{bottom:4px;left:4px;} .pc-br{bottom:4px;right:4px;}

  /* ─── CARD SCREEN ─── */
  #cardScreen { gap:0; padding:0; overflow-y:auto; padding:20px 20px 60px; }

  .card-container {
    width:min(520px,94vw);
    position:relative;
    margin:0 auto;
  }

  .card-header {
    text-align:center;
    padding: 36px 24px 16px;
    position:relative;
  }
  .eid-label {
    font-family:'Rajdhani',sans-serif;
    font-size:clamp(10px,2vw,13px);
    letter-spacing:5px;
    color:var(--cyan);
    text-shadow:0 0 8px var(--cyan);
    animation:fadePulse 3s infinite;
    margin-bottom:8px;
    display:block;
  }
  .eid-main {
    font-family:'Orbitron',sans-serif;
    font-size:clamp(26px,7vw,52px);
    font-weight:900;
    color: var(--fuchsia);
    text-shadow: 0 0 20px var(--fuchsia), 0 0 50px rgba(255,110,199,.5);
    position:relative;
    display:inline-block;
    animation: glitchTitle 4s infinite;
  }
  .eid-main::before { content:attr(data-text); position:absolute; left:0; top:0; color:var(--cyan); animation:glitchA 4s infinite; clip-path:polygon(0 40%,100% 40%,100% 60%,0 60%); }
  .eid-sub {
    font-family:'Orbitron',sans-serif;
    font-size:clamp(18px,5vw,36px);
    color:var(--yellow);
    text-shadow: 0 0 16px var(--yellow2);
    display:block;
    margin-top:4px;
  }

  .year-tag {
    display:inline-block;
    margin-top:10px;
    padding:5px 16px;
    border:1px solid var(--cyan);
    border-radius:20px;
    font-family:'Rajdhani',sans-serif;
    font-size:14px;
    letter-spacing:3px;
    color:var(--cyan);
    background:rgba(125,232,255,0.08);
    box-shadow:0 0 12px rgba(125,232,255,0.2);
  }

  .divider-neon {
    height:2px;
    background:linear-gradient(90deg,transparent,var(--fuchsia),var(--cyan),var(--yellow),transparent);
    margin:16px 0;
    border-radius:2px;
    box-shadow:0 0 10px rgba(255,110,199,.5);
    animation:dividerFlow 3s linear infinite;
    background-size:200%;
  }
  @keyframes dividerFlow{ 0%{background-position:0%} 100%{background-position:200%} }

  /* HOLOGRAM CHAT BUBBLE */
  .chat-bubble {
    background: linear-gradient(135deg, rgba(255,110,199,0.08) 0%, rgba(125,232,255,0.08) 100%);
    border:1px solid rgba(255,110,199,0.4);
    border-radius:16px 16px 16px 4px;
    padding:24px;
    position:relative;
    overflow:hidden;
    box-shadow: 0 0 30px rgba(255,110,199,0.1), inset 0 0 30px rgba(125,232,255,0.03);
    margin: 0 0 16px 0;
  }
  .chat-bubble::before {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,0.04) 0%,transparent 50%);
    pointer-events:none;
  }
  /* scan effect */
  .chat-bubble::after {
    content:'';
    position:absolute; left:0; top:-100%; width:100%; height:100%;
    background:linear-gradient(180deg,transparent,rgba(125,232,255,0.06),transparent);
    animation:hologram 4s linear infinite;
    pointer-events:none;
  }
  @keyframes hologram{ to{top:200%;} }

  .chat-sender {
    font-family:'Rajdhani',sans-serif;
    font-size:11px; letter-spacing:3px;
    color:var(--cyan); text-shadow:0 0 8px var(--cyan);
    margin-bottom:12px;
    display:flex; align-items:center; gap:8px;
  }
  .sender-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--cyan);
    box-shadow:0 0 10px var(--cyan);
    animation:blink 1.5s ease-in-out infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.2;} }

  .msg-hi {
    font-size:clamp(20px,5vw,28px);
    font-weight:800;
    color:var(--yellow);
    text-shadow:0 0 12px var(--yellow2);
    margin-bottom:12px;
  }
  .msg-hi .user-name {
    color:var(--fuchsia);
    text-shadow:0 0 16px var(--fuchsia);
    font-style:italic;
    animation:nameGlow 2s ease-in-out infinite alternate;
  }
  @keyframes nameGlow{ from{text-shadow:0 0 10px var(--fuchsia);} to{text-shadow:0 0 25px var(--fuchsia),0 0 40px rgba(255,110,199,.5);} }

  .msg-body {
    font-size:clamp(13px,2.5vw,15px);
    line-height:1.8;
    color: rgba(240,232,255,0.9);
    margin-bottom:12px;
  }
  .arabic {
    font-size:clamp(16px,3.5vw,22px);
    color:var(--yellow);
    text-shadow:0 0 10px var(--yellow2);
    text-align:center;
    display:block;
    margin:10px 0;
    font-style:italic;
  }
  .msg-sign {
    margin-top:16px;
    font-size:clamp(13px,2.5vw,15px);
    color: var(--cyan);
    font-weight:700;
    text-shadow:0 0 8px var(--cyan);
  }

  /* CHAT TAIL */
  .chat-tail {
    width:0; height:0;
    border-right:14px solid transparent;
    border-top:14px solid rgba(255,110,199,0.4);
    margin-left:10px;
  }

  /* ─── STATS ROW ─── */
  .stats-row {
    display:flex; gap:10px; justify-content:center;
    margin:16px 0;
    flex-wrap:wrap;
  }
  .stat-pill {
    padding:6px 14px;
    border-radius:30px;
    font-family:'Rajdhani',sans-serif;
    font-size:12px; letter-spacing:2px;
    display:flex; align-items:center; gap:6px;
    border:1px solid;
  }
  .sp-f { color:var(--fuchsia); border-color:rgba(255,110,199,.4); background:rgba(255,110,199,.07); }
  .sp-c { color:var(--cyan); border-color:rgba(125,232,255,.4); background:rgba(125,232,255,.07); }
  .sp-y { color:var(--yellow); border-color:rgba(249,248,113,.4); background:rgba(249,248,113,.07); }

  /* ─── GAME BUTTON ─── */
  .btn-game {
    font-family:'Orbitron',sans-serif;
    font-size:clamp(11px,2.5vw,14px);
    font-weight:700;
    letter-spacing:3px;
    color:var(--black);
    background:linear-gradient(135deg,var(--cyan),var(--yellow));
    border:none; cursor:pointer;
    padding:14px 32px;
    border-radius:4px;
    width:100%;
    box-shadow:3px 3px 0 var(--cyan2), 0 0 20px rgba(125,232,255,.4);
    transition:transform .1s, box-shadow .1s;
    position:relative; overflow:hidden;
  }
  .btn-game::before { content:''; position:absolute; top:0; left:-100%; width:60%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent); animation:btnShine 2s linear infinite; }
  .btn-game:hover{transform:translate(-1px,-1px);}
  .btn-game:active{transform:translate(3px,3px);box-shadow:none;}

  /* ─── GAME OVERLAY ─── */
  #gameOverlay {
    position:fixed; inset:0; z-index:100;
    background:rgba(7,7,15,0.95);
    backdrop-filter:blur(6px);
    display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:16px;
  }
  #gameOverlay.active{ display:flex; }

  #gameCanvas {
    border:2px solid var(--cyan);
    box-shadow:0 0 30px rgba(125,232,255,.4);
    border-radius:8px;
    cursor:crosshair;
    touch-action:none;
    max-width:90vw; max-height:50vh;
  }

  .game-title{
    font-family:'Orbitron',sans-serif;
    font-size:clamp(18px,4vw,28px);
    font-weight:900;
    color:var(--yellow);
    text-shadow:0 0 16px var(--yellow2);
    text-align:center;
  }
  .game-hud {
    display:flex; gap:24px; align-items:center;
    flex-wrap:wrap; justify-content:center;
  }
  .hud-pill{
    font-family:'Rajdhani',sans-serif;
    font-size:16px; letter-spacing:2px;
    padding:6px 18px; border-radius:20px;
  }
  .hp-time{ background:rgba(125,232,255,.15); border:1px solid var(--cyan); color:var(--cyan); }
  .hp-score{ background:rgba(255,110,199,.15); border:1px solid var(--fuchsia); color:var(--fuchsia); }

  #gameResult {
    display:none; text-align:center;
    font-family:'Orbitron',sans-serif;
  }
  #gameResult.active{ display:block; }
  .result-title{
    font-size:clamp(22px,5vw,36px);
    font-weight:900;
    color:var(--yellow);
    text-shadow:0 0 20px var(--yellow2);
    margin-bottom:8px;
    animation:glitchTitle 3s infinite;
  }
  .result-sub{ font-size:16px; color:var(--cyan); margin-bottom:20px; }
  .btn-close-game{
    font-family:'Orbitron',sans-serif;
    font-size:13px; letter-spacing:3px;
    color:var(--black);
    background:linear-gradient(135deg,var(--fuchsia),var(--cyan));
    border:none; cursor:pointer;
    padding:12px 32px; border-radius:4px;
    box-shadow:3px 3px 0 var(--fuchsia2);
  }

  /* ─── WATERMARK ─── */
  .watermark {
    position:fixed; bottom:16px; right:20px;
    font-family:'Rajdhani',sans-serif;
    font-size:11px; letter-spacing:3px;
    color:rgba(125,232,255,0.5);
    text-shadow:0 0 8px rgba(125,232,255,.4);
    z-index:3;
    animation:fadePulse 4s ease-in-out infinite;
  }

  /* ─── CARD BG ─── */
  .card-bg {
    position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,110,199,0.04) 0%, rgba(7,7,15,0) 40%, rgba(125,232,255,0.04) 100%);
    border:1px solid rgba(255,110,199,0.2);
    border-radius:20px;
    pointer-events:none;
    box-shadow: 0 0 60px rgba(255,110,199,0.08), 0 0 120px rgba(125,232,255,0.05);
  }
  .card-inner { position:relative; z-index:1; padding:0 20px 20px; }

  /* animation entrance */
  .animate-in { animation: slideUp .6s cubic-bezier(.16,1,.3,1) forwards; opacity:0; }
  @keyframes slideUp { from{opacity:0; transform:translateY(30px);} to{opacity:1; transform:none;} }
  .delay1{animation-delay:.1s;} .delay2{animation-delay:.2s;} .delay3{animation-delay:.3s;} .delay4{animation-delay:.4s;} .delay5{animation-delay:.5s;} .delay6{animation-delay:.6s;}

  /* touch / mobile friendly */
  @media(max-width:480px){
    .mosque{font-size:50px; right:20px;}
    .chat-bubble{padding:16px;}
    .btn-masuk{padding:14px 36px;}
  }
</style>
</head>
<body>

<!-- ─── BG DECOR ─── -->
<div class="bg-decor" id="bgDecor"></div>

<!-- ─── INPUT SCREEN ─── -->
<section class="screen active" id="inputScreen">
  <p class="logo-top">✦ SELAMAT DATANG ✦</p>

  <div class="main-title">
    <span class="t1">EID</span>
    <span class="t2" data-text="MUBARAK">MUBARAK</span>
  </div>

  <div class="subtitle-badge">1447 H · Selamat IDUL FITRI</div>

  <div class="input-wrapper">
    <label class="holo-label" for="nameInput">◈ Tulis nama mu◈</label>
    <div class="holo-input-outer">
      <input
        class="holo-input"
        id="nameInput"
        type="text"
        placeholder="Ketik namamu di sini..."
        autocomplete="off"
        maxlength="40"
      />
      <div class="scan-line"></div>
    </div>
